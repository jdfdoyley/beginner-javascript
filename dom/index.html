<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The DOM</title>
    <link rel="stylesheet" href="../base.css" />

    <style>
      img {
        transition: all 0.2s;
      }
      .round {
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <img class="nice cool open" src="https://picsum.photos/600" />
    <div class="items">
      <div class="item">
        <img src="https://picsum.photos/200" alt="" />
        <p>Hi, I'm an item</p>
      </div>

      <div class="item item2">
        <img src="https://picsum.photos/200" alt="" />
        <h2>I am a heading</h2>
        <p>Hi, I'm an item</p>
      </div>
      <article class="item">
        <h2>I'm an article</h2>
      </article>
    </div>

    <script src="/dom/dom.js"></script>
  </body>
</html>
